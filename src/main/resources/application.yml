spring:
  application:
    name: smart-event-ticket-system
  profiles:
    default: dev-h2
  data:
    redis:
      host: localhost
      port: 6379
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

app:
  redis:
    dashboard-summary-ttl: 10m
    equipment-status-ttl: 30m
    recent-alarm-ttl: 30m
    alarm-dedup-ttl: 2m
    idempotency-processing-ttl: 10m
    idempotency-completed-ttl: 24h
    idempotency-failed-ttl: 10m
    recent-alarm-limit: 20
    rate-limit-window: 1m
    rate-limit-per-minute: 60

